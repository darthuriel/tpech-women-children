<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
<!-- Main building (rounded rectangle, modern) -->
<rect x="8" y="20" width="48" height="40" rx="3"/>
<!-- Tall central tower -->
<rect x="22" y="10" width="20" height="50" rx="2"/>
<!-- White facade panels for windows on tower -->
<rect x="26" y="22" width="4" height="4" fill="white"/>
<rect x="34" y="22" width="4" height="4" fill="white"/>
<rect x="26" y="30" width="4" height="4" fill="white"/>
<rect x="34" y="30" width="4" height="4" fill="white"/>
<rect x="26" y="38" width="4" height="4" fill="white"/>
<rect x="34" y="38" width="4" height="4" fill="white"/>
<!-- Side wing windows (3 columns × 3 rows) -->
<rect x="12" y="28" width="4" height="4" fill="white"/>
<rect x="12" y="36" width="4" height="4" fill="white"/>
<rect x="12" y="44" width="4" height="4" fill="white"/>
<rect x="48" y="28" width="4" height="4" fill="white"/>
<rect x="48" y="36" width="4" height="4" fill="white"/>
<rect x="48" y="44" width="4" height="4" fill="white"/>
<!-- Main entrance (arched) -->
<path d="M28 52 L36 52 L36 60 L28 60 Z" fill="white"/>
<path d="M28 54 Q32 50 36 54 L36 60 L28 60 Z" fill="white"/>
<!-- Medical cross sign on top of tower -->
<circle cx="32" cy="10" r="6" fill="white"/>
<circle cx="32" cy="10" r="5.5"/>
<rect x="30.5" y="6" width="3" height="8" fill="white"/>
<rect x="28" y="8.5" width="8" height="3" fill="white"/>
</svg>
