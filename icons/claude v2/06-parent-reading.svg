<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
<!-- Parent + child silhouette behind (heads + shoulders) -->
<!-- Parent (taller, left) -->
<circle cx="22" cy="14" r="6"/>
<path d="M14 22 Q14 20 22 20 Q30 20 30 22 L29 36 L15 36 Z"/>
<!-- Child (shorter, right, leaning into parent) -->
<circle cx="40" cy="19" r="5"/>
<path d="M33 26 Q33 24 40 24 Q47 24 47 26 L46 36 L34 36 Z"/>
<!-- Open book in foreground (large, covering lower halves) -->
<path d="M6 38
         L32 34
         L58 38
         L58 56
         Q58 58 56 58
         L32 54
         L8 58
         Q6 58 6 56 Z"/>
<!-- Spine of book -->
<line x1="32" y1="34" x2="32" y2="54" stroke="white" stroke-width="0.8"/>
<!-- Left page lines (white) -->
<line x1="12" y1="43" x2="28" y2="40" stroke="white" stroke-width="0.5"/>
<line x1="12" y1="47" x2="28" y2="44" stroke="white" stroke-width="0.5"/>
<line x1="12" y1="51" x2="28" y2="48" stroke="white" stroke-width="0.5"/>
<!-- Right page lines (white) -->
<line x1="36" y1="40" x2="52" y2="43" stroke="white" stroke-width="0.5"/>
<line x1="36" y1="44" x2="52" y2="47" stroke="white" stroke-width="0.5"/>
<line x1="36" y1="48" x2="52" y2="51" stroke="white" stroke-width="0.5"/>
</svg>
