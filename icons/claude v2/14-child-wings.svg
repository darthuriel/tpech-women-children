<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
<!-- LEFT wing — three layered feathers angling up-left -->
<path d="M24 28
         L18 22
         Q8 16 6 24
         L14 26
         Q8 24 4 32
         L14 32
         Q6 32 4 40
         L16 36
         L24 32 Z"/>
<!-- RIGHT wing — three layered feathers angling up-right -->
<path d="M40 28
         L46 22
         Q56 16 58 24
         L50 26
         Q56 24 60 32
         L50 32
         Q58 32 60 40
         L48 36
         L40 32 Z"/>
<!-- Wing feather lines (white separators) -->
<path d="M8 24 L18 26" fill="none" stroke="white" stroke-width="0.8"/>
<path d="M8 30 L18 30" fill="none" stroke="white" stroke-width="0.8"/>
<path d="M56 24 L46 26" fill="none" stroke="white" stroke-width="0.8"/>
<path d="M56 30 L46 30" fill="none" stroke="white" stroke-width="0.8"/>
<!-- Child head (clearly central, between wings) -->
<circle cx="32" cy="20" r="5.5"/>
<!-- Child body -->
<path d="M26 28
         Q26 26 32 26
         Q38 26 38 28
         L37 48
         L27 48 Z"/>
<!-- Arms slightly out (welcoming the flight) -->
<rect x="22" y="30" width="3.5" height="10" rx="1.5" transform="rotate(-15 24 35)"/>
<rect x="38.5" y="30" width="3.5" height="10" rx="1.5" transform="rotate(15 40 35)"/>
<!-- Legs -->
<rect x="27" y="46" width="3.5" height="14" rx="1"/>
<rect x="33.5" y="46" width="3.5" height="14" rx="1"/>
</svg>
