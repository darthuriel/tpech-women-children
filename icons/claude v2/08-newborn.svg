<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
<!-- Swaddle blanket (triangle shape — classic baby wrap) -->
<path d="M10 28
         Q32 18 54 28
         L48 56
         Q44 60 32 60
         Q20 60 16 56 Z"/>
<!-- Baby face area (rounded white) -->
<ellipse cx="32" cy="26" rx="14" ry="12" fill="white"/>
<ellipse cx="32" cy="26" rx="12.5" ry="10.5"/>
<!-- Tuft of hair on top -->
<path d="M28 15 Q32 12 36 15 L34 17 L30 17 Z"/>
<!-- Eyes (closed sleepy lines, white) -->
<path d="M26 26 Q28 28 30 26" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
<path d="M34 26 Q36 28 38 26" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
<!-- Cute smile (white) -->
<path d="M30 31 Q32 33 34 31" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
<!-- Rosy cheek dots (slightly inset, white) -->
<circle cx="22" cy="29" r="1.3" fill="white" opacity="0.6"/>
<circle cx="42" cy="29" r="1.3" fill="white" opacity="0.6"/>
<!-- Swaddle fold detail -->
<path d="M22 44 L32 50 L42 44" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
</svg>
